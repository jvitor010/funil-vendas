            const allBtns = document.querySelectorAll('.answer-btn');
            allBtns.forEach(btn => {
                btn.style.pointerEvents = 'none';
                btn.classList.add('opacity-50');
            });

            btnElement.classList.remove('opacity-50');
            btnElement.classList.add('answer-selected');

            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    renderQuestion();
                } else {
                    renderAnalysis();
                }
            }, 400);

                progress += Math.random() * 4 + 1;

                } else if (progress > 60 && progress < 85 && stepIndex === 1) {
                    analyzeText.innerText = analysisSteps[1];
                    stepIndex++;
                } else if (progress > 85 && stepIndex === 2) {
                    analyzeText.innerText = analysisSteps[2];
                    stepIndex++;
                }

                    analyzeBar.style.width = "100%";
                    analyzeText.classList.remove('animate-pulse');
                    analyzeText.classList.add('text-teal-600');
