        function renderWelcome() {

        function startQuiz() {
            currentQuestionIndex = 0;

        function renderQuestion() {
            const currentData = quizData[currentQuestionIndex];

            const answersHtml = currentData.answers.map((answer, index) => `

                        <i data-lucide="${answer.icon}" class="w-5 h-5 text-${answer.color}-500"></i>
                    </div>
                </button>
            `).join('');

            container.innerHTML = `
                <div class="glass-card rounded-[2.5rem] p-6 sm:p-10 shadow-2xl fade-enter">
                    <div class="mb-10">
                        <div class="flex justify-between items-center mb-3">

                            <div class="bg-gradient-to-r from-teal-400 to-teal-500 h-2.5 rounded-full transition-all duration-700 ease-out" style="width: ${progressPercentage}%"></div>
                        </div>
                    </div>

                    <h2 class="text-xl sm:text-2xl font-black text-slate-900 mb-10 leading-snug min-h-[6rem] tracking-tight">
                        ${currentData.question}
                    </h2>

                    <div class="space-y-4" id="answers-wrapper">
                        ${answersHtml}
                    </div>
                </div>
            `;
            updateIcons();
        }

        function handleAnswer(btnElement, answerIndex) {
            if (answerIndex === 0) userScore += 2;
            if (answerIndex === 1) userScore += 1;

            const allBtns = document.querySelectorAll('.answer-btn');
            allBtns.forEach(btn => {
                btn.style.pointerEvents = 'none';
                btn.classList.add('opacity-50');
            });

            btnElement.classList.remove('opacity-50');
            btnElement.classList.add('answer-selected');

            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    renderQuestion();
                } else {
                    renderAnalysis();
                }
            }, 400);
        }

        function renderAnalysis() {
            container.innerHTML = `
                <div class="glass-card rounded-[2.5rem] p-10 shadow-2xl text-center fade-enter min-h-[400px] flex flex-col items-center justify-center">
                    <div class="relative w-24 h-24 mb-8">
                        <div class="absolute inset-0 border-[6px] border-slate-100 rounded-full"></div>
                        <div class="absolute inset-0 border-[6px] border-teal-500 rounded-full border-t-transparent md:animate-spin"></div>
                        <i data-lucide="cpu" class="w-10 h-10 text-teal-600 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"></i>
                    </div>
                    
                    <h2 class="text-2xl font-black text-slate-900 mb-6 tracking-tight">Mapeando a sua rotina...</h2>
                    
                    <div class="w-full max-w-xs bg-slate-200 rounded-full h-4 overflow-hidden mb-4 shadow-inner relative">
                        <div id="analyzeBar" class="bg-gradient-to-r from-teal-400 to-teal-600 h-4 rounded-full transition-all ease-linear" style="width: 5%;"></div>
                    </div>
                    
                    <p id="analyzeText" class="text-xs font-bold text-slate-500 uppercase tracking-widest md:animate-pulse">
                        Estruturando seu perfil...
                    </p>
                </div>
            `;
            updateIcons();

            let progress = 5;
            const analyzeBar = document.getElementById('analyzeBar');
            const analyzeText = document.getElementById('analyzeText');

            const analysisSteps = [
                "Analisando seus hábitos e desconfortos...",
                "Buscando as melhores rotinas de alívio...",
                "Finalizando o seu plano prático de leveza..."
            ];
            let stepIndex = 0;

            function validateQuiz() {
                progress += Math.random() * 4 + 1;
                analyzeBar.style.width = Math.min(progress, 100) + "%";

                if (progress > 30 && progress < 60 && stepIndex === 0) {
                    analyzeText.innerText = analysisSteps[0];
                    stepIndex++;
                } else if (progress > 60 && progress < 85 && stepIndex === 1) {
                    analyzeText.innerText = analysisSteps[1];
                    stepIndex++;
                } else if (progress > 85 && stepIndex === 2) {
                    analyzeText.innerText = analysisSteps[2];
                    stepIndex++;
                }

                if (progress >= 100) {
                    analyzeBar.style.width = "100%";
                    analyzeText.classList.remove('animate-pulse');
                    analyzeText.classList.add('text-teal-600');
                    analyzeText.innerText = "Avaliação Concluída!";

                    setTimeout(() => {
                        renderTeaser();
                    }, 1200);
                } else {
                    setTimeout(validateQuiz, 150);
                }
            }

            setTimeout(validateQuiz, 500);
        }

        // RESULTADO DO QUIZ — tela única com nome + redirect direto

                    value: 0,
                    currency: 'BRL'
                });
            }

            // Webhook em background sem bloquear redirect
            if (WEBHOOK_URL) {
                fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({
                        nome: userName,
                        email: '',
                        whatsapp: whatsappValue,
                        pontuacao: userScore,
                        origem: 'Quiz Lipedema'
                    })
                }).catch(() => {});
            }

            const sev = severity || (userScore >= 9 ? 'critico' : userScore >= 5 ? 'moderado' : 'leve');

            const params = new URLSearchParams({
                fname: userName.split(' ')[0],
                score: sev,
                src: 'quiz_funnel'
            });

            window.location.href = './landing.html?' + params.toString();
        }

    </script>

        // 🔒 SISTEMA ANTI-ESPIONAGEM (DLP)
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', function (event) {
            if (event.ctrlKey && event.shiftKey && (event.key === 'I' || event.key === 'J' || event.key === 'C')) {
                event.preventDefault();
            }
            if (event.ctrlKey && event.key === 'U') {
                event.preventDefault();
            }
            if (event.key === 'F12') {
                event.preventDefault();
            }
        });
        // Console block
        setInterval(function () {
            !function () {
                function e(e) { if (isNaN(e)) console.log("Spying blocked"); else e() }
                e(function () { debugger })
            }()
        }, 1000);
    </script>
